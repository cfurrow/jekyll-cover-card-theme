<div class="content">
    {% if site.background %}
    <img src="{{ site.background }}" id="fullscreen">
    {% endif %}

    {% if site.avatar %}
        <img src="{{ site.avatar }}" id="avatar">
    {% endif %}

    <h1 class="site-title">{{ site.title }}</h1>
    <h3 class="site-description">{{ site.description }}</h3>
</div>
